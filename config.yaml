# ============================================================
# NERDALERT — SYSTEM CONFIGURATION
# ============================================================
# This file is safe to commit to Git.
# It contains NO secrets — only settings and permissions.
#
# How trust levels work:
#   0 = Read & Reason only (no external connections)
#   1 = Read External (view-only access to connected services)
#   2 = Draft & Suggest (propose actions, nothing sent without approval)
#   3 = Act with Approval (execute approved actions, all logged)
#   4 = Autonomous (pre-approved routine tasks, still logged)
#   5 = Elevated Access (SSH, filesystem exec — session-unlock only)
# ============================================================

# --- AGENT PERSONALITY ---
agent:
  name: "Sherman"           # What the agent calls itself
  personality: "sherman"   # Which personality file to load
  trust_level: 1           # Global trust level — start low, raise deliberatey

# --- CRON ---
cron:
  enabled: true            # Master switch for the cron engine + cron_manager tool

# --- HEARTBEAT MODULE ---
# Periodic agent-judgment tick. Architecturally distinct from cron:
#   - cron jobs are USER-AUTHORED schedules with their own job records
#     and fire deterministic actions ("morning brief at 6am")
#   - heartbeat is a SINGLE periodic pulse that asks registered module
#     hooks "is anything worth surfacing?" and only invokes the LLM
#     when at least one hook returns a signal
#
# Designed to avoid the OpenClaw heartbeat failure modes:
#   - Hard session isolation: heartbeat NEVER touches the chat session
#   - Deterministic gatekeeper: LLM is skipped when no hook signals
#   - Bounded prompt builder: hard input-token cap, no full chat history
#   - Hard tool-disable default: heartbeat runs cannot inherit chat tools
#   - Output fingerprinting: dedup repeated alerts within a window
#   - Token budget + circuit breaker: caps runaway cost and self-disables
#     after consecutive errors
#
# Disabled by default. When false, no scheduler is registered, no hooks
# are called, no boot init runs. Strict-superset preserved.
heartbeat:
  enabled: true
  interval_minutes: 30           # how often the scheduler ticks

  quiet_hours:
    enabled: true
    start: "23:00"               # local time (timezone below)
    end:   "07:00"
    timezone: "America/Chicago"  # set to your local timezone — IANA format (e.g. "Europe/London", "Asia/Tokyo")

  budget:
    per_tick_input_cap:  16000   # max input tokens for any single LLM call
    per_day_token_cap:   500000  # cumulative input+output across all ticks per day

  model:
    # Default heartbeat model. Heartbeat should NOT burn paid tokens
    # when a free local model is available. The v0.7 BYOK milestone
    # will let smart-routing prefer this over the active chat model
    # for any heartbeat invocation. Override per environment.
    provider: "ollama"
    name:     "mistral-small3.2:latest"

  delivery:
    target:        "telegram"    # where surfaced alerts route
    routine_quiet: true          # routine signals batched, critical signals immediate

# --- SERVER ---
server:
  port: 3773               # Overridden by SERVER_PORT in .env if set
  local_only: true         # Never accept connections from outside localhost

# --- TOOL GROUPS ---
# Many tools belong to a service (Wazuh has 5 tools, Pi-hole has 6, etc.).
# A group's enabled/trust_level applies to every tool whose .name starts
# with the group's prefix.
#
# To disable an entire service:  set its group enabled: false.
# To override a single tool:      add it under `tools:` below — per-tool
#                                 entries always win over a group match.
#
# trust_level here is a floor-raise: it can RAISE the requirement above
# a tool's compiled minimum, but never lower it. Resolution lives in
# src/tools/registry.ts (resolveToolPolicy).
tool_groups:
  wazuh:
    prefix: "wazuh_"
    enabled: false
    trust_level: 1

  pihole:
    prefix: "pihole_"
    enabled: false
    trust_level: 1

  crowdsec:
    prefix: "crowdsec_"
    enabled: false
    trust_level: 1

  pfsense:
    prefix: "pfsense_"
    enabled: false
    trust_level: 1

  fail2ban:
    prefix: "fail2ban_"
    enabled: false
    trust_level: 1

  ntopng:
    prefix: "ntopng_"
    enabled: false
    trust_level: 1

  nmap:
    prefix: "nmap_"
    enabled: false       # Active probes — opt in deliberately
    trust_level: 2       # Compiled minimum for nmap_* tools

  loki:
    prefix: "loki_"
    enabled: false
    trust_level: 1

  influxdb:
    prefix: "influxdb_"
    enabled: false
    trust_level: 1

# --- TOOLS ---
# Per-tool overrides, keyed by exact tool.name. Wins over tool_groups above.
# enabled: true/false controls whether the agent can see/use the tool at all
# trust_level: minimum trust level required to call this tool (floor-raise)
tools:
  calculate:
    enabled: true
    trust_level: 0         # Pure CPU, no network, no credentials — safe at all
                           # trust levels. Prevents arithmetic hallucinations.

  wikipedia:
    enabled: true
    trust_level: 1         # Outbound HTTP to en.wikipedia.org, no auth.
                           # Same trust profile as weather and web tools.

  currency:
    enabled: true
    trust_level: 1         # Outbound HTTP to api.frankfurter.dev, no auth.
                           # ECB reference rates, daily updates. Same trust
                           # profile as wikipedia / weather / maps.

  reminders:
    enabled: true
    trust_level: 1         # Writes to data/reminders.db and fires via Telegram.
                           # No external system access beyond Telegram (itself L1).
                           # One-shot only — recurring schedules belong to cron_manager.

  maps:
    enabled: true
    trust_level: 1         # Outbound HTTP to Nominatim + OSRM, no auth.
                           # Same trust profile as wikipedia and weather.

  memory:
    enabled: true
    trust_level: 1         # Read at L1; write actions live in the wrapper at L1
                           # too (capture/supersede are not gated server-side
                           # because the engine has supersede/decay for recovery).
                           # Per-action gating is a v0.7 follow-up.

  weather:
    enabled: true
    trust_level: 1

  web:
    enabled: true
    trust_level: 1

  rss:
    enabled: true
    trust_level: 1         # Outbound HTTP to public feed URLs, no auth.
                           # Same trust profile as web / weather / wikipedia.

  timer:
    enabled: true
    trust_level: 1         # Agent-driven countdowns + stopwatches. No network,
                           # no credentials. State persists in
                           # ~/.nerdalert/timers.json. UI component is invisible
                           # when no timers active — strict-superset holds.

  host_metrics:
    enabled: true
    trust_level: 1         # Local OS reads only — no auth, no network

  project:
    enabled: true
    trust_level: 1         # Sandboxed reads under ~/.nerdalert/projects/

  documents:
    enabled: true
    trust_level: 1         # L1 covers index/search/list/get/reindex/resolve_refs.
                           # forget is gated to L2 INSIDE the tool's execute()
                           # — destructive (drops chunks + embeddings + original).

  gmail:
    enabled: true         # Will be enabled when Gmail module is built
    trust_level: 1

  google_calendar:
    enabled: true
    trust_level: 1

  cron_manager:
    enabled: true
    trust_level: 1         # Agent can manage jobs at L1

  github:
    enabled: true
    trust_level: 1         # Read-only access to repos, issues, PRs, notifications.
                           # OAuth Device Flow via 'github-setup' tool, token in
                           # the OS keychain (or file fallback). Disabling this
                           # entry hides the tool from the agent; the credential
                           # stays in the keychain untouched.

  github-setup:
    enabled: true
    trust_level: 1         # Onboarding wizard. Writes to keychain only.
                           # No filesystem mutations outside docs read-only.

  plex:
    enabled: false
    trust_level: 4

  sonarr:
    enabled: false
    trust_level: 4

  radarr:
    enabled: false
    trust_level: 4

  ssh:
    enabled: false         # Level 5 — never on by default, session-unlock only
    trust_level: 5

  browser:
    enabled: false
    trust_level: 4

# --- LOGGING ---
logging:
  enabled: true
  log_dir: "./logs"
  log_tool_calls: true     # Every tool call the agent makes is logged
  log_approvals: true      # Every approve/reject decision is logged

# --- AUTH STRATEGY ---
# Controls how clients prove they are allowed to talk to this server.
# Options:
#   "token"     — static bearer token from .env (default, works right now)
#   "authentik" — OAuth 2.0 SSO via your Authentik instance (built in UI phase)
#   "none"      — no auth (local dev only, never use with sensitive tools enabled)
auth:
  strategy: "token"

# --- VOICE MODULE ---
# Local STT + TTS. Currently wires the TTS half (Slice 1); STT lands
# in Slice 3. Setting enabled: false hides every voice surface in the
# UI and refuses to mount the /api/tts route — zero visible breakage
# elsewhere when disabled (module isolation contract).
#
# voices_dir holds per-personality ONNX models, structured as:
#   ~/.nerdalert/voices/<personality_id>/voice.onnx
#   ~/.nerdalert/voices/<personality_id>/voice.onnx.json
#
# The repo never ships voice files — see docs/voice_module_block.md for
# the license-clean rationale. Users drop their own trained ONNX into
# this directory and the matching personality's speaker icon lights up.
voice:
  enabled: true
  tts:
    provider: piper                # only 'piper' supported today
    voices_dir: ~/.nerdalert/voices
    auto_play_default: false        # UI default; per-user override available
    max_chars_per_request: 5000     # DoS guard for long-text requests
  # stt block — read by /api/stt as of Slice 3. Same isolation
  # contract as TTS — turning voice.enabled off hides the route.
  #
  # `model` is the short name (e.g. `base.en`); the server resolves it
  # to <models_dir>/ggml-<model>.bin. This matches whisper.cpp's
  # download-ggml-model.sh output, so dropping a model in is just:
  #   bash /path/to/whisper.cpp/models/download-ggml-model.sh base.en \
  #     ~/.nerdalert/whisper-models
  # See whisper-models.example/README.md for full setup.
  stt:
    provider: whisper-local
    models_dir: ~/.nerdalert/whisper-models
    model: base.en
    max_recording_seconds: 60

# --- DOCUMENTS MODULE ---
# Chunked, embedding-indexed document store (v0.6.3). Originals live at
# ~/.nerdalert/documents/<content-hash>.<ext>, chunks at
# ~/.nerdalert/documents/chunks.jsonl, embeddings share the existing
# memory-embeddings.json store under the `doc:` key namespace (reserved by
# v0.5.26).
#
# Same module-isolation contract as voice and memory.semantic: setting
# enabled: false (or removing the block) collapses the tool out of the
# registry, prevents any documents-* path under ~/.nerdalert/documents/
# from being created, and leaves the rest of the UX byte-identical to
# v0.6.2.x. Setting it true ships the tool but does NOT auto-index
# anything — indexing is explicit via the documents tool's index action,
# or via the (deferred) lazy-read path in project.read.
#
# Embedding capability is INHERITED from memory.semantic.* — if the
# bge-base model is installed and that block is enabled, document chunks
# get embedded as they're indexed. If not, the documents tool still
# works (the search action falls back to substring matching across
# chunks) but semantic recall is degraded.
#
# v0.6.3 ships index, reindex, search, list, get, resolve_refs (L1), and
# forget (L2). Lazy-index on first project.read is deferred to v0.6.3.1.
documents:
  enabled: true

# --- MEMORY MODULE — SEMANTIC SUB-BLOCK ---
# Optional toggle for hybrid (TF-IDF + embedding) search. The core memory
# engine — capture, search, recent, decay — ships and works without this
# block; absence = pure keyword search, identical UX to v0.5.25 and earlier.
# Setting enabled: false here, or removing the whole block, collapses
# search() back to TF-IDF only and never loads the embedding model into
# RAM. Same module isolation contract as the voice block above.
#
# When enabled, the engine routes search() through a hybrid scorer:
#   finalScore = (blend_weight * cosine) + ((1 - blend_weight) * tfidf)
# 0.5 lets semantic earn its weight from a neutral start — tune from
# observed retrieval quality once there's enough corpus to measure on.
#
# model_path is the directory containing the embedding model in the
# standard HuggingFace layout (config.json, tokenizer.json, onnx/).
# Ships pointing at BAAI/bge-base-en-v1.5 (MIT, 768-dim, 109M params,
# commercial-clean). The repo never ships embedding model files —
# users download once at install. See README.md for the curl command.
#
# If the model directory is missing at boot, the capability check
# returns { available: false } and the engine falls back to TF-IDF
# transparently — no agent-visible breakage, single line logged.
memory:
  semantic:
    enabled: true
    provider: huggingface-local      # only 'huggingface-local' supported today
    model_path: ~/.nerdalert/embeddings/bge-base-en-v1.5
    blend_weight: 0.5                 # 0.0 = keyword-only, 1.0 = semantic-only

# --- SKILLS MODULE (Adaptive Recall) ---
# Self-improving skill store (v0.6.5). L1 = deterministic post-session quality
# scoring (no model in the path); L2 = manual /skill save extraction. Layer 3
# (curator cron) + community pipeline are future milestones.
#
# Skills are DATA, never commands: a skill describes an APPROACH the agent
# reads as context; it can never issue a tool call. Trust levels stay the line
# that decides what tools actually fire.
#
# Storage: ~/.nerdalert/skills/ (JSONL + index); L1 quality log at
# ~/.nerdalert/sessions/quality.jsonl; embeddings share memory-embeddings.json
# under the skill: namespace (reserved v0.5.26 alongside doc:).
#
# Independent of memory.enabled. Module-isolation contract (like voice /
# documents / memory.semantic): enabled false or absent => no skills seeded,
# no ~/.nerdalert/skills/* created, v0.6.4 UX byte-identical.
skills:
  enabled: true
